<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="layout :: content">
<head>
  <title>Product Management</title>
</head>
<body>
<h2>Product Management</h2>

<div>
  <form th:action="@{/product}" method="post" th:object="${productDto}">
    <div class="form-row">
      <div class="form-group col-md-2">
        <label for="id">ID</label>
        <input type="number" th:field="*{id}" class="form-control" id="id" 
               th:readonly="${mode == 'EDIT' or mode == 'DELETE'} ? false : false" />
        <div class="text-danger" th:if="${#fields.hasErrors('id')}" th:errors="*{id}"></div>
      </div>
      <div class="form-group col-md-3">
        <label for="name">Name</label>
        <input type="text" th:field="*{name}" class="form-control" id="name" 
               th:readonly="${mode == 'DELETE'}" />
        <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
      </div>
      <div class="form-group col-md-4">
        <label for="description">Description</label>
        <input type="text" th:field="*{description}" class="form-control" id="description" 
               th:readonly="${mode == 'DELETE'}" />
        <div class="text-danger" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
      </div>
      <div class="form-group col-md-2">
        <label for="price">Price</label>
        <input type="number" step="0.01" th:field="*{price}" class="form-control" id="price" 
               th:readonly="${mode == 'DELETE'}" />
        <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
      </div>
      <div class="form-group col-md-1 align-self-end">
        <button type="submit" name="action" value="load" class="btn btn-info" 
                th:if="${mode == 'EDIT' or mode == 'DELETE'}">Load</button>
      </div>
    </div>

    <div th:if="${loadError != null}" class="alert alert-danger" role="alert" th:text="${loadError}"></div>

    <div class="form-group">
      <button type="submit" name="action" value="add" class="btn btn-success" 
              th:disabled="${mode != 'IDLE'}">Add</button>
      <button type="submit" name="action" value="edit" class="btn btn-primary" 
              th:disabled="${mode != 'IDLE'}">Edit</button>
      <button type="submit" name="action" value="delete" class="btn btn-danger" 
              th:disabled="${mode != 'IDLE'}">Delete</button>
      <button type="submit" name="action" value="save" class="btn btn-primary" 
              th:disabled="${mode == 'IDLE'}">Save</button>
      <button type="submit" name="action" value="exit" class="btn btn-secondary">Exit</button>
    </div>
  </form>
</div>

<hr />

<h3>Existing Products</h3>
<table class="table table-striped table-bordered">
  <thead class="thead-dark">
    <tr>
      <th>ID</th>
      <th>Name</th>
    </tr>
  </thead>
  <tbody>
    <tr th:each="product : ${products}">
      <td th:text="${product.id}">1</td>
      <td th:text="${product.name}">Milk</td>
    </tr>
  </tbody>
</table>

</body>
</html>
